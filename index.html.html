            vid: { id: "hhOz6R5H0RY", label: "Notion for Project Management \u2014 Complete Guide" },
            tips: ["AI can clean and format messy data 10x faster than manual work", "Learn ONE CRM deeply \u2014 HubSpot Free is the best starting point", "Asana/ClickUp/Monday \u2014 the platform matters less than mastering one deeply", "Automate repetitive data entry with Zapier before doing it manually"],
            content: "<p>Data entry, CRM management, and project coordination are bread-and-butter VA tasks. AI doesn\u2019t eliminate these jobs \u2014 it makes you dramatically faster and more accurate at them.</p><h3>AI-Powered Data Entry & Cleanup</h3><p>Most data entry work involves messy, inconsistent data. AI cleans it in seconds:</p><blockquote>\u201CClean this data: standardize all phone numbers to +63 format, capitalize all names properly, fix obvious typos in email addresses, remove duplicate entries (keep the most recent), fill in missing city names based on zip codes where possible, and flag any entries with incomplete information.\u201D</blockquote><p>For spreadsheet work, paste your column headers into AI and ask: \u201CWrite formulas to validate, clean, and standardize the data in each column. Explain what each formula does.\u201D</p><h3>CRM Management</h3><p><strong>Popular CRMs and when to use each:</strong></p><ul><li><strong>HubSpot CRM (Free)</strong> \u2014 Best free option. Contact management, deal pipeline, email tracking, meeting scheduling. Perfect for small businesses and startups.</li><li><strong>Salesforce</strong> \u2014 Enterprise-level. Complex but powerful. Higher-paying clients use this.</li><li><strong>Pipedrive</strong> \u2014 Sales-focused. Best visual pipeline. Great for sales teams.</li><li><strong>Zoho CRM</strong> \u2014 Affordable alternative to Salesforce with AI assistant (Zia).</li></ul><p><strong>AI-Enhanced CRM Tasks:</strong></p><ul><li><strong>Lead scoring:</strong> \u201CAnalyze these leads and score them 1\u201310 based on: company size, engagement level, budget fit, and timeline urgency.\u201D</li><li><strong>Follow-up emails:</strong> AI drafts personalized follow-ups based on CRM data and conversation history</li><li><strong>Pipeline reports:</strong> \u201CSummarize this sales pipeline data. What\u2019s the total value, win probability, and recommended next actions for each deal?\u201D</li></ul><h3>Project Management</h3><p><strong>The Big Three Platforms:</strong></p><ul><li><strong>Asana</strong> \u2014 Best for task management and workflows. Clean, intuitive interface.</li><li><strong>ClickUp</strong> \u2014 Most feature-rich. Combines tasks, docs, goals, and time tracking. Can be overwhelming.</li><li><strong>Monday.com</strong> \u2014 Best visual boards. Great for creative teams and client-facing dashboards.</li></ul><p><strong>AI for Project Management:</strong></p><blockquote>\u201CBreak this project into tasks with dependencies, deadlines, and assignees: [describe project]. Create a timeline accounting for [constraints]. Flag potential bottlenecks and suggest buffer time.\u201D</blockquote><p>Use Zapier to automate project updates: task completed in Asana \u2192 Slack notification \u2192 client email update \u2192 time logged in tracking sheet.</p>"
          }
        ]
      }
    ]
  },  {
    id: "writing", icon: "\u270D\uFE0F", title: "Writing & Copywriting", tagline: "AI-enhanced writing that sounds human", color: "#DC2626",
    modules: [
      {
        title: "Content Writing with AI",
        lessons: [
          {
            title: "Blog Writing at 10x Speed with AI",
            vid: { id: "p09yRj47kNM", label: "AI Content & SEO Writing \u2014 Jeff Su" },
            tips: ["Never publish raw AI output \u2014 always humanize and add your voice", "SEO AI + human editing = Google rankings and organic traffic", "Build a template library for different content types", "A 2,000-word blog post should take 50 minutes with AI, not 5 hours"],
            content: "<p>AI doesn\u2019t replace blog writers \u2014 it makes them <strong>10x faster</strong>. The key is using AI as a first-draft machine while you provide the strategy, expertise, and human touch that makes content engaging and trustworthy.</p><h3>The 6-Step AI Blog Workflow (50 Minutes for 2,000 Words)</h3><p><strong>Step 1: Topic Research (5 min)</strong></p><blockquote>\u201C20 blog post ideas for [niche] targeting [audience]. For each idea, include: title, target keyword, search intent type (informational/commercial/navigational), and estimated competition level.\u201D</blockquote><p>Use Perplexity to validate which topics have actual search demand. Focus on informational intent for traffic and commercial intent for conversions.</p><p><strong>Step 2: Outline (5 min)</strong></p><blockquote>\u201CCreate a detailed outline for a blog post titled \u2018[title]\u2019 targeting the keyword \u2018[keyword]\u2019. Include: H1 title, meta description (155 characters), hook paragraph approach, 5\u20137 H2 sections each with 2\u20133 H3 sub-points, a conclusion with CTA, and a FAQ section with 5 questions people actually search for.\u201D</blockquote><p><strong>Step 3: Section-by-Section Drafting (15 min)</strong></p><p>Write each section as a separate prompt. This gives better results than asking for the entire article at once:</p><blockquote>\u201CWrite the introduction for a blog post about [topic]. Hook with a specific problem the reader faces, establish authority with a stat or personal insight, preview what they\u2019ll learn. 150 words. Conversational, not corporate.\u201D</blockquote><p>Repeat for each H2 section, always specifying tone and length.</p><p><strong>Step 4: Humanize (10 min)</strong></p><p>This is the step most people skip, and it\u2019s the most important. Read through and add: personal anecdotes or client stories, specific examples (not generic ones), your opinions and expertise, brand voice touches, cultural references your audience relates to.</p><p><strong>Step 5: SEO Optimization (5 min)</strong></p><blockquote>\u201CReview this blog post for SEO. The target keyword is \u2018[keyword]\u2019. Suggest: where to naturally add the keyword, internal link opportunities, image alt-text descriptions, and meta description improvements.\u201D</blockquote><p><strong>Step 6: Polish (10 min)</strong></p><p>Grammarly for grammar and readability. Hemingway Editor (free online) to check reading level (aim for Grade 6\u20138). Read the opening paragraph aloud \u2014 if it sounds robotic, rewrite it.</p><p><strong>Total: ~50 minutes</strong> for a 2,000-word SEO-optimized blog post that would take 4\u20136 hours without AI.</p>"
          },
          {
            title: "Making AI Content Sound Human",
            vid: { id: "SpazTFm-e_8", label: "AI Writing Techniques \u2014 Simplilearn" },
            tips: ["If it could fit any generic article, make it specific to YOUR topic", "Read your content aloud \u2014 if it sounds robotic, rewrite those parts", "Your unique voice is your competitive advantage over pure AI", "Specificity is the antidote to generic AI writing"],
            content: "<p>The biggest complaint about AI writing: it sounds \u201Crobotic\u201D or \u201Cgeneric.\u201D And honestly, raw AI output DOES sound that way. But the problem isn\u2019t AI \u2014 it\u2019s that people publish raw AI output without humanizing it. Here\u2019s how to fix that.</p><h3>Red Flags That Scream \u201CAI Wrote This\u201D</h3><ul><li>\u201CIn today\u2019s fast-paced world...\u201D \u201CIn the ever-evolving landscape...\u201D</li><li>\u201CIt\u2019s important to note that...\u201D \u201CIt\u2019s worth mentioning...\u201D</li><li>\u201CLet\u2019s dive in...\u201D \u201CLet\u2019s explore...\u201D \u201CWithout further ado...\u201D</li><li>Excessive use of \u201Cdelve,\u201D \u201Cleverage,\u201D \u201Cutilize,\u201D \u201Cgame-changer,\u201D \u201Cseamlessly\u201D</li><li>Perfect parallel structure in every paragraph</li><li>Generic examples that could apply to any business in any country</li><li>Every paragraph starting with a bold statement followed by an explanation</li><li>Lists of exactly 5 items, every time</li></ul><h3>The Four Humanization Techniques</h3><p><strong>1. Imperfection</strong></p><p>Real humans don\u2019t write in perfect, polished paragraphs. Start sentences with \u201CAnd\u201D or \u201CBut.\u201D Use contractions. Write sentence fragments sometimes. Break grammar rules when it sounds more natural. Mix short sentences with longer ones.</p><p><strong>2. Specificity</strong></p><p>Replace every generic reference with something specific. \u201CMany businesses\u201D becomes \u201Cthe sari-sari store near my apartment in Caloocan.\u201D \u201CA recent study\u201D becomes \u201CA 2025 HubSpot survey of 3,400 marketers.\u201D Specific details signal human knowledge and experience.</p><p><strong>3. Personality</strong></p><p>Add YOUR opinions, reactions, and experiences. \u201CI\u2019ve tested this with 12 clients and it works every single time\u201D has 10x more impact than \u201CThis strategy has proven effective.\u201D Tell the reader what surprised you, what frustrated you, what excited you. Emotion is human.</p><p><strong>4. The Anti-AI Prompt</strong></p><blockquote>\u201CRewrite this as a real person with 10 years of experience would write it in a casual blog post. Remove all corporate jargon, clich\u00E9s, filler phrases, and AI-style openings. Add specific examples from [industry/context]. Use contractions, vary sentence length, and write like you\u2019re explaining this to a friend over coffee.\u201D</blockquote><h3>The \u201CWould a Human Say This?\u201D Test</h3><p>Read every sentence and ask: \u201CWould I actually say this out loud to a colleague?\u201D If the answer is no, rewrite it until it sounds like something a real person would say.</p>"
          }
        ]
      },
      {
        title: "Client Communications",
        lessons: [
          {
            title: "Writing Proposals That Win Clients",
            vid: { id: "g5oEAoKdrdw", label: "ChatGPT for Business Proposals \u2014 Howfinity" },
            tips: ["Personalize every proposal \u2014 never send templates as-is", "Three pricing tiers: most clients pick the middle one", "Follow up within 3 days if no response", "The proposal\u2019s design matters almost as much as its content"],
            content: "<p>A great proposal is the difference between getting hired and getting ignored. AI helps you create professional, personalized proposals in 30 minutes instead of 3 hours.</p><h3>The 6-Part Proposal Structure</h3><p><strong>1. Executive Summary (3 sentences)</strong></p><p>Mirror the client\u2019s exact language from your discovery call. \u201CClient: [X]. Their challenge: [Y]. My solution: [Z].\u201D This shows you listened and understood.</p><p><strong>2. Understanding Their Needs</strong></p><p>Restate their problem in YOUR words but using THEIR terminology. This section proves you get it. If you had a discovery call, reference specific things they said.</p><p><strong>3. Your Solution</strong></p><p>Specific tasks you\u2019ll perform, tools you\u2019ll use, deliverables with timelines, and measurable outcomes they can expect. Be concrete: \u201C4 Instagram posts per week\u201D not \u201Csocial media management.\u201D</p><p><strong>4. Pricing (3 Tiers)</strong></p><ul><li><strong>Basic:</strong> Core tasks only. The \u201Cfoot in the door.\u201D</li><li><strong>Standard:</strong> Core + reporting and strategy. <em>Most clients pick this one.</em></li><li><strong>Premium:</strong> Everything + proactive strategy and priority support.</li></ul><p>The psychology of three tiers: the Basic makes Standard look like great value. The Premium makes Standard look reasonable. Most clients pick the middle.</p><p><strong>5. Social Proof</strong></p><p>Testimonials, case studies, or results from similar work. AI helps write these: \u201CWrite a brief case study from these notes. Problem: [X]. Solution: [Y]. Result: [Z]. Under 100 words.\u201D</p><p><strong>6. Clear Next Steps</strong></p><p>Remove all friction: \u201CReady to start? Book a 15-minute call here: [Calendly link]\u201D or \u201CReply \u2018YES\u2019 and I\u2019ll send the service agreement today.\u201D</p><h3>Design in Canva</h3><p>Export as a branded PDF, under 5 pages, using the client\u2019s colors if possible. Professional presentation builds trust before you even start working. Canva has proposal templates you can customize in 10 minutes.</p>"
          },
          {
            title: "AI for Everyday Client Communication",
            vid: { id: "g5oEAoKdrdw", label: "ChatGPT for Professional Communication \u2014 Howfinity" },
            tips: ["Professional warmth beats corporate formality every time", "Keep emails under 5 sentences whenever possible", "AI can draft 20 emails in the time it takes you to write 1", "Save every great email as a template for future use"],
            content: "<p>As a VA, you spend a significant portion of your day writing emails, messages, and updates. AI can draft these in seconds, but the key is maintaining your professional voice and your client\u2019s brand tone.</p><h3>The Client Communication Template Library</h3><p>Build templates for every recurring communication type. AI creates the initial versions; you refine and personalize:</p><p><strong>Status Updates:</strong></p><blockquote>\u201CDraft a weekly status update email for a client. Format: What was completed this week (3\u20135 items with brief details), What\u2019s in progress (2\u20133 items with status), What needs client input (specific questions), Next week\u2019s priorities. Tone: professional but warm. Under 200 words.\u201D</blockquote><p><strong>Scope Boundary Setting:</strong></p><blockquote>\u201CDraft a polite but firm email declining a task that falls outside my agreed scope. The client asked me to [task]. My scope includes [what\u2019s included]. I want to maintain the relationship while being clear about boundaries. Offer alternatives: I can do it as an add-on project, or suggest someone else.\u201D</blockquote><p><strong>Rate Increase Communication:</strong></p><blockquote>\u201CDraft an email informing a long-term client about a rate increase from [\u20B1X] to [\u20B1Y] per [hour/month], effective [date]. Emphasize: the value I\u2019ve delivered (mention specific results), new skills I\u2019ve added (AI tools), and market rate context. Give 30 days notice. Warm, confident, not apologetic.\u201D</blockquote><p><strong>Difficult Conversation Starters:</strong></p><ul><li>Missed deadline apology + recovery plan</li><li>Disagreeing with a client\u2019s approach (diplomatically)</li><li>Requesting faster feedback or clearer instructions</li><li>Addressing late payment professionally</li></ul><p>For each, ask AI to draft 2\u20133 options at different levels of directness so you can choose the approach that fits the situation.</p>"
          }
        ]
      }
    ]

    id: "cs", icon: "\uD83C\uDFA7", title: "Customer Service", tagline: "Amazing support with AI backup", color: "#0891B2",
    modules: [
      {
        title: "AI-Powered Customer Support",
        lessons: [
          {
            title: "Setting Up AI Customer Service Systems",
            vid: { id: "p6uPjFrjCqo", label: "Build AI Customer Support Bot \u2014 Botpress" },
            tips: ["AI drafts responses, humans review and send \u2014 never fully automated for sensitive issues", "The best CS combines AI speed with human empathy", "Build your knowledge base from actual customer questions, not guesses", "Tier 1 (routine) can be automated; Tier 2 (complex/emotional) needs humans"],
            content: "<p>Modern customer service uses AI to handle routine inquiries instantly while routing complex issues to humans. This <strong>tiered approach</strong> is what most businesses need, and setting it up is a high-value service VAs can offer.</p><h3>The AI CS Tool Stack</h3><ul><li><strong>Live Chat:</strong> Intercom (Fin AI handles 50%+ of queries automatically), Zendesk (AI ticketing and routing), Freshdesk (affordable), Tidio (best for small businesses and Shopify)</li><li><strong>Email Support:</strong> Front (shared inbox + AI drafts), Help Scout (knowledge base + AI), Gmail + templates (budget option)</li><li><strong>Phone/Meeting:</strong> Otter.ai (real-time transcription), Fireflies.ai (meeting recording + AI summaries + action items)</li></ul><h3>Building the System Step by Step</h3><p><strong>Step 1: Knowledge Base</strong></p><p>Compile the top 50 questions customers actually ask. Don\u2019t guess \u2014 pull from: support email history, chat logs, social media DMs, phone call notes, and FAQ pages.</p><blockquote>\u201COrganize these 50 customer questions into 8\u201310 categories. For each question, write a clear, friendly answer in the brand\u2019s voice. Include: the answer, any relevant links or resources, and when to escalate to a human.\u201D</blockquote><p><strong>Step 2: Response Templates</strong></p><blockquote>\u201CCreate 25 customer service response templates covering: order status inquiries, return/exchange requests, shipping delay explanations, billing questions, product usage help, complaint acknowledgment, compliment responses, refund processing, technical troubleshooting, and escalation to supervisor. Each should be warm, empathetic, and professional. Under 100 words each.\u201D</blockquote><p><strong>Step 3: Triage System</strong></p><ul><li><strong>Tier 1 (AI handles):</strong> FAQ questions, order status, basic product info, hours/location, simple policy questions</li><li><strong>Tier 2 (Human handles):</strong> Complaints, angry customers, complex issues, VIP clients, anything requiring judgment or empathy</li></ul><p><strong>Step 4: Automation Setup</strong></p><p>Use Zapier or the platform\u2019s built-in automation: new ticket \u2192 AI categorizes by topic and urgency \u2192 suggests response template \u2192 routes to appropriate agent (or auto-responds for Tier 1).</p>"
          },
          {
            title: "Handling Difficult Customers with AI",
            vid: { id: "3-cnNsF6gBU", label: "AI Chatbots for Client Support \u2014 Liam Ottley" },
            tips: ["Address feelings BEFORE offering solutions", "A great recovery from a problem creates MORE loyalty than no problem at all", "Never let AI handle angry customers without human review", "The AAFA framework works for any difficult situation"],
            content: "<p>Every customer service professional encounters difficult situations. AI helps you respond quickly, professionally, and with the right tone \u2014 even when you\u2019re stressed or the customer is being unreasonable.</p><h3>The AAFA De-escalation Framework</h3><p>This 4-step framework works for virtually any angry or upset customer:</p><p><strong>1. Acknowledge:</strong> \u201CI completely understand your frustration with [specific issue].\u201D</p><p>Name the emotion. Name the specific problem. This shows you\u2019re listening, not just following a script. Never say \u201CI understand\u201D without specifying WHAT you understand \u2014 that feels dismissive.</p><p><strong>2. Apologize:</strong> \u201CI\u2019m truly sorry for the inconvenience this has caused you.\u201D</p><p>Apologize for the experience, even if it wasn\u2019t your fault. You\u2019re not admitting liability \u2014 you\u2019re expressing empathy. \u201CI\u2019m sorry you experienced this\u201D is different from \u201CIt\u2019s our fault.\u201D</p><p><strong>3. Fix:</strong> \u201CHere\u2019s exactly what I\u2019m going to do: [specific action with timeline].\u201D</p><p>Be specific. \u201CI\u2019ll look into this\u201D is weak. \u201CI\u2019m processing your replacement right now. You\u2019ll receive a tracking number within 2 hours\u201D is strong. Give a concrete action and a concrete timeline.</p><p><strong>4. Assure:</strong> \u201CI\u2019ll personally follow up with you by [specific time] to make sure this is fully resolved.\u201D</p><p>Personal ownership and a follow-up commitment. This transforms the interaction from \u201Ccustomer vs company\u201D to \u201Cwe\u2019re on the same team.\u201D</p><h3>AI-Assisted Response Drafting</h3><blockquote>\u201CA customer is angry about [specific issue]. Their message: \u201C[paste their exact message].\u201D\n\nDraft 3 response options:\n1. Full resolution with compensation (refund/discount/free item)\n2. Empathetic acknowledgment with honest explanation and partial solution\n3. Take-it-offline response (move to phone call or email for complex resolution)\n\nAll must be empathetic, professional, solution-oriented, and never defensive. Use the AAFA framework.\u201D</blockquote><h3>The Service Recovery Paradox</h3><p>Research shows that a customer who had a problem that was <strong>resolved excellently</strong> becomes MORE loyal than a customer who never had a problem at all. This is the \u201Cservice recovery paradox.\u201D When something goes wrong, it\u2019s actually an opportunity to create a superfan \u2014 if you handle it with empathy, speed, and genuine care.</p><p><strong>Golden Rule:</strong> AI can draft the response, but a human should ALWAYS review it before sending to an upset customer. AI can miss emotional nuance, cultural context, and the difference between a frustrated customer who needs empathy and an abusive customer who needs boundaries.</p>"
          },
          {
            title: "Building Chatbots for Clients",
            vid: { id: "Y_DicBz78Yo", label: "How to Build AI Chatbots \u2014 Leon van Zyl" },
            tips: ["Chatbots reduce customer service costs by 30\u201350%", "Always include a \u2018Talk to a human\u2019 option \u2014 never trap users in bot loops", "ManyChat for social DMs, Chatbase for website bots", "This is a high-value service: \u20B115K\u201350K setup + \u20B13K\u20138K monthly"],
            content: "<p>Building chatbots for clients is one of the <strong>highest-value services</strong> a VA can offer. The setup fee alone can be \u20B115K\u201350K, plus monthly maintenance of \u20B13K\u20138K. And with no-code platforms, you don\u2019t need to write a single line of code.</p><h3>No-Code Chatbot Platforms</h3><ul><li><strong>ManyChat</strong> \u2014 Best for Instagram DM and Facebook Messenger automation. Visual flow builder. Comment-to-DM triggers. E-commerce integrations. Free for basic, $15/mo for Pro.</li><li><strong>Chatbase</strong> \u2014 Best for GPT-powered website chatbots trained on custom content. Upload a website URL and documents, get an intelligent bot. $19\u201399/mo.</li><li><strong>Tidio</strong> \u2014 Best for small business websites and Shopify stores. Live chat + chatbot + email in one. Free tier available.</li><li><strong>Botpress</strong> \u2014 Most powerful open-source option. More technical but maximum flexibility. Free self-hosted.</li></ul><h3>The 5-Step Chatbot Build Process</h3><p><strong>Step 1: Discovery</strong></p><blockquote>\u201CGenerate the top 30 questions customers would ask a [type of business], organized by category: product/service questions, pricing, shipping/delivery, returns/exchanges, hours/location, support, and buying guidance.\u201D</blockquote><p><strong>Step 2: Conversation Flows</strong></p><p>Design paths for every scenario: greeting \u2192 product inquiry \u2192 pricing \u2192 FAQ \u2192 support request \u2192 booking/purchase \u2192 human escalation. Each path should feel like a natural conversation, not a menu tree.</p><p><strong>Step 3: Train</strong></p><p>Upload FAQs, product catalogs, pricing info, policies, and brand voice guidelines. For Chatbase, just paste the website URL and upload key documents. For ManyChat, build the responses manually using your AI-generated templates.</p><p><strong>Step 4: Test Thoroughly</strong></p><p>Try to break every flow. Ask unexpected questions. Test edge cases. Misspell words. Use slang. What happens when the bot doesn\u2019t know the answer? (It should gracefully escalate to a human, never say \u201CI don\u2019t know\u201D and stop.)</p><p><strong>Step 5: Launch & Monitor</strong></p><p>Review conversation logs weekly. Track: questions the bot couldn\u2019t answer (add these to training), customer satisfaction scores, conversion rate (how many bot conversations lead to a sale/booking), and escalation rate (should decrease over time as bot improves).</p><h3>Pricing Your Chatbot Service</h3><ul><li><strong>Simple FAQ bot:</strong> \u20B115K\u201320K setup + \u20B13K/mo maintenance</li><li><strong>E-commerce bot (product rec + order tracking):</strong> \u20B125K\u201340K + \u20B15K/mo</li><li><strong>Advanced GPT-powered bot:</strong> \u20B135K\u201350K + \u20B18K/mo</li></ul><p>This is <strong>recurring revenue</strong> that compounds. 5 chatbot clients at \u20B15K/mo maintenance = \u20B125K/month passive income on top of the setup fees.</p>"
          }
        ]
      }
    ]
  },
  {
    id: "agents", icon: "\uD83E\uDD16", title: "AI Agents & Automation", tagline: "Build systems that work while you sleep", color: "#4B5563",
    modules: [
      {
        title: "Understanding AI Agents",
        lessons: [
          {
            title: "What Are AI Agents and Why They Matter",
            vid: { id: "r6uX3btBgvw", label: "n8n Complete Guide \u2014 AI Agents \u2014 Nick Saraev" },
            tips: ["Agents = AI + Tools + Decision-making ability", "Start simple with ONE automated workflow before building complex systems", "VAs who build agents earn 2\u20133x more than traditional VA rates", "This is the future of VA work \u2014 learning this now puts you years ahead"],
            content: "<p>AI Agents represent the <strong>biggest shift in AI since ChatGPT launched</strong>. They\u2019re the next evolution, and understanding them now puts you years ahead of other VAs.</p><h3>The Difference: Chatbot vs Agent</h3><p><strong>Chatbot (what most people use now):</strong> You give step-by-step instructions. \u201CSearch for competitors. Now write a report. Now format it. Now email it to the client.\u201D Each step requires YOUR input.</p><p><strong>Agent:</strong> You give a GOAL. \u201CResearch our top 5 competitors and email a formatted report to the client by Friday.\u201D The agent breaks this into steps, decides which tools to use, executes each step, checks its own work, handles errors, and completes the entire workflow. You just review the final output.</p><h3>Types of Agents</h3><p><strong>Single Agent:</strong> One AI model connected to a set of tools. Example: a Custom GPT with Zapier Actions that can search the web, check a spreadsheet, draft an email, and send it \u2014 all from a single instruction.</p><p><strong>Multi-Agent System:</strong> Multiple AI agents working as a team, each with a specialized role:</p><ul><li>Research Agent finds and organizes information</li><li>Writer Agent creates content from the research</li><li>Quality Agent reviews for accuracy and brand consistency</li><li>Distribution Agent publishes and schedules across platforms</li></ul><p><strong>Human-in-the-Loop:</strong> Agents that complete 90% of the work autonomously but pause at critical decision points for your approval before proceeding. This is the recommended approach for most VA work \u2014 you maintain quality control while the agent handles the heavy lifting.</p><h3>Why This Matters for Your Career</h3><p>The VA industry is heading toward a split:</p><ul><li><strong>Task VAs</strong> (do what they\u2019re told, step by step): Rates stagnate at \u20B1250\u2013400/hr as AI handles more routine tasks</li><li><strong>Systems VAs</strong> (build automated workflows and AI agents): Rates increase to \u20B1700\u20131,500/hr because they\u2019re creating leverage, not just executing tasks</li></ul><p>Learning to build and manage AI agents puts you firmly in the second category. A single well-built automation can save a client 20+ hours per month \u2014 that\u2019s worth premium rates.</p>"
          },
          {
            title: "Building Custom GPTs (No Code Required)",
            vid: { id: "CESpjoZh9b4", label: "Custom GPTs Complete Course \u2014 Simplilearn" },
            tips: ["The instructions you write are 90% of the GPT\u2019s quality", "Upload example outputs to show the GPT exactly what you want", "Create separate GPTs for separate tasks for best results", "Add Zapier Actions to turn a text GPT into a real agent that DOES things"],

var completed = {};
try { completed = JSON.parse(localStorage.getItem("vaAcademy_done") || "{}"); } catch(e) { completed = {}; }
function saveCompleted() { localStorage.setItem("vaAcademy_done", JSON.stringify(completed)); }

var currentCourse = null;
var currentModule = null;
var currentLesson = null;

function totalLessons(course) { var n = 0; for (var i = 0; i < course.modules.length; i++) n += course.modules[i].lessons.length; return n; }
function completedLessons(course) { var n = 0; for (var i = 0; i < course.modules.length; i++) for (var j = 0; j < course.modules[i].lessons.length; j++) if (completed[course.id + "-" + course.modules[i].lessons[j].title]) n++; return n; }
var allLessonCount = 0; for (var i = 0; i < COURSES.length; i++) allLessonCount += totalLessons(COURSES[i]);
function allCompletedCount() { var n = 0; for (var i = 0; i < COURSES.length; i++) n += completedLessons(COURSES[i]); return n; }

function openTab(name) {
  var tabs = ["home","tools","bible","profile"];
  var btns = [document.getElementById("tabLearn"), document.getElementById("tabTools"), document.getElementById("tabBible"), document.getElementById("tabProfile")];
  for (var i = 0; i < tabs.length; i++) {
    var pg = document.getElementById("pg-" + tabs[i]);
    if (pg) { pg.classList.remove("active"); }
    if (btns[i]) btns[i].classList.remove("active");
  }
  document.getElementById("pg-course").classList.remove("active");
  document.getElementById("pg-lesson").classList.remove("active");
  document.getElementById("pg-toolguide").classList.remove("active");
  var target = document.getElementById("pg-" + name);
  if (target) target.classList.add("active");
  if (name === "home") { btns[0].classList.add("active"); renderHome(); }
  else if (name === "tools") { btns[1].classList.add("active"); }
  else if (name === "bible") { btns[2].classList.add("active"); renderBiblePage(); }
  else if (name === "profile") { btns[3].classList.add("active"); renderProfile(); }
  window.scrollTo(0, 0);
}

function showPage(id) {
  var pages = document.querySelectorAll(".page");
  for (var i = 0; i < pages.length; i++) pages[i].classList.remove("active");
  document.getElementById("pg-" + id).classList.add("active");
  var btns = [document.getElementById("tabLearn"), document.getElementById("tabTools"), document.getElementById("tabProfile")];
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove("active");
  document.getElementById("tabLearn").classList.add("active");
  window.scrollTo(0, 0);
}

function goHome() { renderHome(); showPage("home"); }

function openCourse(idx) {
  currentCourse = COURSES[idx];
  renderCourse(idx);
  showPage("course");
}

function openLesson(courseIdx, modIdx, lesIdx) {
  currentCourse = COURSES[courseIdx];
  currentModule = currentCourse.modules[modIdx];
  currentLesson = currentModule.lessons[lesIdx];
  renderLesson(courseIdx, modIdx, lesIdx);
  showPage("lesson");
}

function handleSearch() {
  var q = document.getElementById("searchField").value.toLowerCase().trim();
  var el = document.getElementById("searchResultsBox");
  if (!q) { el.style.display = "none"; return; }
  var results = [];
  for (var ci = 0; ci < COURSES.length; ci++) {
    var c = COURSES[ci];
    for (var mi = 0; mi < c.modules.length; mi++) {
      for (var li = 0; li < c.modules[mi].lessons.length; li++) {
        var les = c.modules[mi].lessons[li];
        if (les.title.toLowerCase().indexOf(q) !== -1 || les.content.toLowerCase().indexOf(q) !== -1) {
          results.push({ c: c, ci: ci, mi: mi, li: li, les: les });
        }
      }
    }
  }
  if (results.length === 0) { el.style.display = "none"; return; }
  results = results.slice(0, 8);
  el.style.display = "block";
  var html = "";
  for (var i = 0; i < results.length; i++) {
    var r = results[i];
    html += '<div style="padding:12px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid var(--border);" onmouseover="this.style.background=\'var(--bg2)\'" onmouseout="this.style.background=\'\'" onclick="openLesson(' + r.ci + ',' + r.mi + ',' + r.li + ');document.getElementById(\'searchField\').value=\'\';document.getElementById(\'searchResultsBox\').style.display=\'none\'"><span style="font-size:20px">' + r.c.icon + '</span><div><div style="font-size:13px;font-weight:600">' + r.les.title + '</div><div style="font-size:11px;color:var(--text3)">' + r.c.title + '</div></div></div>';
  }
  el.innerHTML = html;
}

      html += '<div style="flex:1;font-size:13px;font-weight:600">' + les.title + '</div>';
      html += '<div style="color:var(--text3)">\u203A</div></div>';

  }
  document.getElementById("pg-course").innerHTML = html;
}

function renderLesson(ci, mi, li) {
  var c = COURSES[ci], mod = c.modules[mi], les = mod.lessons[li];
  var lid = c.id + "-" + les.title;
  var ok = !!completed[lid];

  // Build flat list for prev/next
  var flat = [];
  for (var m = 0; m < c.modules.length; m++) for (var l = 0; l < c.modules[m].lessons.length; l++) flat.push({ mi: m, li: l });
  var idx = -1;
  for (var i = 0; i < flat.length; i++) { if (flat[i].mi === mi && flat[i].li === li) { idx = i; break; } }
  var prev = idx > 0 ? flat[idx - 1] : null;
  var next = idx < flat.length - 1 ? flat[idx + 1] : null;

  var html = '';
  html += '<button class="btn btn-ghost btn-sm" onclick="openCourse(' + ci + ')" style="margin-bottom:12px">\u2190 ' + c.title + '</button>';
  html += '<div class="chip" style="background:' + c.color + '12;color:' + c.color + ';margin-bottom:8px">' + mod.title + '</div>';
  html += '<h2 style="font-size:22px;margin-bottom:20px">' + les.title + '</h2>';

  // Article content
  html += '<div class="article-body" style="margin-bottom:22px">' + les.content + '</div>';

  // Tips
  if (les.tips && les.tips.length > 0) {
    html += '<div style="margin-bottom:22px"><div style="font-size:13px;font-weight:700;color:var(--gold);margin-bottom:10px">\uD83D\uDCA1 Pro Tips</div>';
    for (var i = 0; i < les.tips.length; i++) {
      html += '<div class="tip-box">' + les.tips[i] + '</div>';
    }
    html += '</div>';
  }

  // Video
  if (les.vid) {
    html += '<div style="margin-bottom:22px"><div style="font-size:13px;font-weight:700;color:var(--blue);margin-bottom:10px">\uD83D\uDCFA Watch & Learn</div>';
    html += '<a href="https://www.youtube.com/watch?v=' + les.vid.id + '" target="_blank" rel="noopener" class="vid-link">';
    html += '<div style="width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#FF0000,#CC0000);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="18" height="18" viewBox="0 0 24 24" fill="white"><polygon points="9,6 9,18 18,12"/></svg></div>';
    html += '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--text)">' + les.vid.label + '</div><div style="font-size:11px;color:var(--text3);margin-top:2px">Watch on YouTube \u2197</div></div></a></div>';
  }

  // Complete button
  html += '<button class="btn ' + (ok ? 'btn-ghost' : 'btn-primary') + '" style="width:100%;margin-bottom:12px" onclick="completed[\'' + lid.replace(/'/g, "\\'") + '\']=' + (ok ? 'false' : 'true') + ';saveCompleted();openLesson(' + ci + ',' + mi + ',' + li + ')">' + (ok ? '\u2713 Completed \u2014 Tap to Undo' : 'Mark as Complete \u2713') + '</button>';

  // Prev/Next
  html += '<div style="display:flex;gap:8px">';
  if (prev) html += '<button class="btn btn-ghost btn-sm" style="flex:1" onclick="openLesson(' + ci + ',' + prev.mi + ',' + prev.li + ')">\u2190 Previous</button>';
  if (next) html += '<button class="btn btn-ghost btn-sm" style="flex:1;border-color:' + c.color + '30;color:' + c.color + '" onclick="openLesson(' + ci + ',' + next.mi + ',' + next.li + ')">Next \u2192</button>';
  html += '</div>';

  document.getElementById("pg-lesson").innerHTML = html;
}

var bibleState = { view: "books", book: null, chapter: null, testament: "OT" };
var bibleCache = {};
// Load persistent Bible cache from localStorage
(function loadBibleCache() {
  try {
    var saved = localStorage.getItem("vaAcademy_bibleText");
    if (saved) bibleCache = JSON.parse(saved);
  } catch(e) {}
})();
function saveBibleCache() {
  try { localStorage.setItem("vaAcademy_bibleText", JSON.stringify(bibleCache)); } catch(e) {}
}

function renderBiblePage() {
  if (bibleState.view === "chapters") return renderBibleChapters();
  if (bibleState.view === "reading") return renderBibleReading();

function renderBibleChapters() {
  var b = BIBLE_BOOKS[bibleState.book];
  var html = '';
  html += '<button class="btn btn-ghost btn-sm" onclick="bibleState.view=\'books\';renderBiblePage()" style="margin-bottom:14px">\u2190 All Books</button>';
  html += '<h2 style="font-size:22px;margin-bottom:4px">' + b.n + '</h2>';
  var cachedCount = 0;
  for (var ch = 1; ch <= b.c; ch++) { if (bibleCache[b.id + "-" + ch]) cachedCount++; }
  html += '<p style="font-size:11px;color:var(--text3);margin-bottom:14px">' + cachedCount + ' of ' + b.c + ' chapters saved offline</p>';
  html += '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">';
  for (var ch = 1; ch <= b.c; ch++) {
    var isCached = !!bibleCache[b.id + "-" + ch];
    html += '<div class="card card-hover" style="text-align:center;padding:14px 6px;cursor:pointer;font-size:16px;font-weight:700;color:' + (isCached ? 'var(--green)' : 'var(--gold)') + ';position:relative" onclick="bibleState.chapter=' + ch + ';bibleState.view=\'reading\';renderBibleReading()">' + ch;
    if (isCached) html += '<div style="position:absolute;top:3px;right:5px;font-size:7px;color:var(--green)">\u2713</div>';
    html += '</div>';
  }
  html += '</div>';
  if (cachedCount < b.c) {
    html += '<div style="text-align:center;margin-top:16px"><button class="btn btn-ghost btn-sm" onclick="prefetchBook(' + (bibleState.book) + ')">\u2B07 Download all ' + b.n + ' chapters for offline</button></div>';
  }
  document.getElementById("pg-bible").innerHTML = html;
}

function prefetchBook(bookIdx) {
  var b = BIBLE_BOOKS[bookIdx];
  var toFetch = [];
  for (var ch = 1; ch <= b.c; ch++) { if (!bibleCache[b.id + "-" + ch]) toFetch.push(ch); }
  if (toFetch.length === 0) return;
  var done = 0;
  var el = document.getElementById("pg-bible");
  function updateProgress() {
    done++;
    var pct = Math.round(done / toFetch.length * 100);
    var statusEl = document.getElementById("downloadStatus");
    if (statusEl) statusEl.textContent = "Downloading " + b.n + "... " + pct + "% (" + done + "/" + toFetch.length + ")";
    if (done >= toFetch.length) { saveBibleCache(); renderBibleChapters(); }
  }
  el.innerHTML += '<div id="downloadStatus" style="text-align:center;padding:12px;font-size:12px;color:var(--gold);font-weight:600">Starting download of ' + toFetch.length + ' chapters...</div>';
  // Fetch in batches of 3 to not overwhelm the API
  var i = 0;
  function fetchNext() {
    if (i >= toFetch.length) return;
    var ch = toFetch[i]; i++;
    fetch("https://bolls.life/get-text/WEB/" + b.id + "/" + ch + "/")
      .then(function(r){return r.json()})
      .then(function(data){ bibleCache[b.id+"-"+ch]=data; updateProgress(); fetchNext(); })
      .catch(function(){ updateProgress(); fetchNext(); });
  }
  fetchNext(); fetchNext(); fetchNext(); // Start 3 parallel fetches
}

function renderBibleReading() {
  var b = BIBLE_BOOKS[bibleState.book];
  var ch = bibleState.chapter;
  var cacheKey = b.id + "-" + ch;
  var html = '';
  html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">';
  html += '<button class="btn btn-ghost btn-sm" onclick="bibleState.view=\'chapters\';renderBibleChapters()">\u2190</button>';
  html += '<h2 style="font-size:20px;flex:1">' + b.n + ' ' + ch + '</h2>';
  if (ch > 1) html += '<button class="btn btn-ghost btn-sm" onclick="bibleState.chapter--;renderBibleReading()">\u25C0</button>';
  if (ch < b.c) html += '<button class="btn btn-ghost btn-sm" onclick="bibleState.chapter++;renderBibleReading()">\u25B6</button>';
  html += '</div>';

  if (bibleCache[cacheKey]) {
    html += formatBibleVerses(bibleCache[cacheKey], b.n, ch);
  } else {
    html += '<div id="bibleLoading" style="text-align:center;padding:40px;color:var(--text3)"><div style="font-size:28px;margin-bottom:10px;animation:pulse 1.5s infinite">\u271D\uFE0F</div><div style="font-size:13px">Loading Scripture...</div><div style="font-size:11px;margin-top:6px;color:var(--text3)">Requires internet connection</div></div>';
    fetchBibleChapter(b.id, ch);
  }
  document.getElementById("pg-bible").innerHTML = html;
}

function fetchBibleChapter(bookId, chapter) {
  var cacheKey = bookId + "-" + chapter;
  fetch("https://bolls.life/get-text/WEB/" + bookId + "/" + chapter + "/")
    .then(function(r) { return r.json(); })
    .then(function(data) {
      bibleCache[cacheKey] = data;
      saveBibleCache();
      if (bibleState.view === "reading") renderBibleReading();
      // Pre-fetch next and previous chapters silently
      var b = BIBLE_BOOKS[bibleState.book];
      if (chapter < b.c && !bibleCache[bookId + "-" + (chapter+1)]) {
        fetch("https://bolls.life/get-text/WEB/" + bookId + "/" + (chapter+1) + "/").then(function(r){return r.json()}).then(function(d){bibleCache[bookId+"-"+(chapter+1)]=d;saveBibleCache()}).catch(function(){});
      }
      if (chapter > 1 && !bibleCache[bookId + "-" + (chapter-1)]) {
        fetch("https://bolls.life/get-text/WEB/" + bookId + "/" + (chapter-1) + "/").then(function(r){return r.json()}).then(function(d){bibleCache[bookId+"-"+(chapter-1)]=d;saveBibleCache()}).catch(function(){});
      }
    })
    .catch(function() {
      var el = document.getElementById("bibleLoading");
      if (el) el.innerHTML = '<div style="font-size:28px;margin-bottom:10px">\u26A0\uFE0F</div><div style="font-size:13px;color:var(--red)">Could not load chapter</div><div style="font-size:11px;margin-top:6px;color:var(--text3)">Check your internet connection. Once read, chapters are saved for offline reading.</div><button class="btn btn-ghost btn-sm" style="margin-top:12px" onclick="renderBibleReading()">Retry</button>';
    });
}

function formatBibleVerses(data, bookName, chapter) {
  var user = JSON.parse(localStorage.getItem("vaAcademy_user") || "{}");
  var notesKey = "vaAcademy_bibleNotes_" + (user.u || "guest");
  var allNotes = JSON.parse(localStorage.getItem(notesKey) || "{}");
  var chapterKey = bookName + " " + chapter;

  var html = '<div style="font-family:Literata,serif;font-size:16px;line-height:2;color:var(--text)">';
  for (var i = 0; i < data.length; i++) {
    var v = data[i];
    var text = v.text.replace(/<[^>]*>/g, '');
    var vKey = chapterKey + ":" + v.verse;
    var vData = allNotes[vKey] || {};
    var isHL = !!vData.hl;
    var hasNote = !!vData.note;
    var cls = "verse-span" + (isHL ? " highlighted" : "") + (hasNote ? " has-note" : "");
    html += '<span class="' + cls + '" onclick="openVerseMenu(\'' + vKey.replace(/'/g, "\\'") + '\')" title="' + (hasNote ? 'Note: ' + (vData.note || '').substring(0, 50).replace(/"/g, '&quot;') : 'Tap to highlight or add note') + '">';
    html += '<span style="font-size:10px;font-weight:800;color:var(--gold);vertical-align:super;margin-right:3px">' + v.verse + '</span>' + text + '</span> ';
  }
  html += '</div>';

  // Show notes for this chapter if any
  var chapterNotes = [];
  for (var key in allNotes) {
    if (key.indexOf(chapterKey + ":") === 0 && allNotes[key].note) {
      chapterNotes.push({ verse: key.split(":").pop(), note: allNotes[key].note });
    }
  }
  if (chapterNotes.length > 0) {
    html += '<div style="margin-top:20px;padding:16px;background:var(--blueBg);border:1px solid rgba(99,102,241,0.2);border-radius:12px">';
    html += '<div style="font-size:11px;font-weight:700;color:var(--blue);margin-bottom:8px">\uD83D\uDCDD Your Notes for ' + chapterKey + '</div>';
    for (var i = 0; i < chapterNotes.length; i++) {
      html += '<div style="font-size:13px;margin-bottom:6px"><strong style="color:var(--gold)">v' + chapterNotes[i].verse + ':</strong> ' + chapterNotes[i].note.replace(/</g, '&lt;') + '</div>';
    }
    html += '</div>';
  }

  // Copyright
  html += '<div style="text-align:center;margin-top:24px;padding:16px;border-top:1px solid var(--border);font-size:10px;color:var(--text3);line-height:1.6">' + bookName + ' ' + chapter + ' (WEB) \u2014 World English Bible \u2014 Public Domain</div>';
  // Prev/Next
  var b = BIBLE_BOOKS[bibleState.book];
  html += '<div style="display:flex;gap:8px;margin-top:12px">';
  if (chapter > 1) html += '<button class="btn btn-ghost" style="flex:1" onclick="bibleState.chapter--;renderBibleReading()">\u25C0 Chapter ' + (chapter - 1) + '</button>';
  if (chapter < b.c) html += '<button class="btn btn-primary" style="flex:1" onclick="bibleState.chapter++;renderBibleReading()">Chapter ' + (chapter + 1) + ' \u25B6</button>';
  html += '</div>';
  return html;
}

// Verse highlight/note popup
var _activeVerseKey = null;
function openVerseMenu(vKey) {
  _activeVerseKey = vKey;
  var user = JSON.parse(localStorage.getItem("vaAcademy_user") || "{}");
  var notesKey = "vaAcademy_bibleNotes_" + (user.u || "guest");
  var allNotes = JSON.parse(localStorage.getItem(notesKey) || "{}");
  var vData = allNotes[vKey] || {};
  var isHL = !!vData.hl;
  var note = vData.note || "";
  var parts = vKey.split(":");
  var ref = parts[0]; var verseNum = parts[1];

  // Remove existing popup
  var old = document.getElementById("versePopup");
  if (old) old.remove();

  var popup = document.createElement("div");
  popup.id = "versePopup";
  popup.className = "verse-note-popup";
  popup.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:14px;font-weight:700">' + ref + ':' + verseNum + '</div><button onclick="document.getElementById(\'versePopup\').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3)">\u00D7</button></div>'
    + '<div style="display:flex;gap:8px;margin-bottom:14px">'
    + '<button class="btn ' + (isHL ? 'btn-primary' : 'btn-ghost') + ' btn-sm" style="flex:1" onclick="toggleHighlight()">' + (isHL ? '\u2713 Highlighted' : '\uD83D\uDD06 Highlight') + '</button>'
    + '<button class="btn btn-ghost btn-sm" style="flex:1;color:var(--red)" onclick="deleteVerseData()">\uD83D\uDDD1 Remove All</button>'
    + '</div>'
    + '<textarea id="verseNoteInput" class="field" rows="3" placeholder="Add a note or reflection..." style="font-size:13px;margin-bottom:10px">' + note.replace(/</g, '&lt;') + '</textarea>'
    + '<button class="btn btn-primary btn-sm" style="width:100%" onclick="saveVerseNote()">\uD83D\uDCBE Save Note</button>';
  document.body.appendChild(popup);
}

function toggleHighlight() {
  var user = JSON.parse(localStorage.getItem("vaAcademy_user") || "{}");
  var notesKey = "vaAcademy_bibleNotes_" + (user.u || "guest");
  var allNotes = JSON.parse(localStorage.getItem(notesKey) || "{}");
  if (!allNotes[_activeVerseKey]) allNotes[_activeVerseKey] = {};
  allNotes[_activeVerseKey].hl = !allNotes[_activeVerseKey].hl;
  if (!allNotes[_activeVerseKey].hl && !allNotes[_activeVerseKey].note) delete allNotes[_activeVerseKey];
  localStorage.setItem(notesKey, JSON.stringify(allNotes));
  document.getElementById("versePopup").remove();
  renderBibleReading();
}

function saveVerseNote() {
  var note = document.getElementById("verseNoteInput").value.trim();
  var user = JSON.parse(localStorage.getItem("vaAcademy_user") || "{}");
  var notesKey = "vaAcademy_bibleNotes_" + (user.u || "guest");
  var allNotes = JSON.parse(localStorage.getItem(notesKey) || "{}");
  if (!allNotes[_activeVerseKey]) allNotes[_activeVerseKey] = {};
  if (note) { allNotes[_activeVerseKey].note = note; }
  else { delete allNotes[_activeVerseKey].note; if (!allNotes[_activeVerseKey].hl) delete allNotes[_activeVerseKey]; }
  localStorage.setItem(notesKey, JSON.stringify(allNotes));
  document.getElementById("versePopup").remove();
  renderBibleReading();
}

function deleteVerseData() {
  var user = JSON.parse(localStorage.getItem("vaAcademy_user") || "{}");
  var notesKey = "vaAcademy_bibleNotes_" + (user.u || "guest");
  var allNotes = JSON.parse(localStorage.getItem(notesKey) || "{}");
  delete allNotes[_activeVerseKey];
  localStorage.setItem(notesKey, JSON.stringify(allNotes));
  document.getElementById("versePopup").remove();
  renderBibleReading();
}

// RENDER: PROFILE
// ============================================================
function renderProfile() {
  var user = {};
  try { user = JSON.parse(localStorage.getItem("vaAcademy_user") || "{}"); } catch(e) {}
  var done = allCompletedCount();
  var pct = allLessonCount > 0 ? (done / allLessonCount * 100) : 0;

  var html = '';
  html += '<div class="overline" style="margin-bottom:6px">Your Profile</div>';
  html += '<h2 style="font-size:22px;margin-bottom:18px">Progress & Settings</h2>';

  html += '<div class="card" style="text-align:center;padding:24px;margin-bottom:14px;cursor:default">';
  html += '<div style="font-size:40px;margin-bottom:10px">\uD83C\uDF93</div>';
  html += '<div style="font-size:18px;font-weight:700">' + (user.n || 'Student') + '</div>';
  html += '<div style="font-size:13px;color:var(--text3);margin-top:3px">AI-Powered Virtual Assistant</div></div>';

  html += '<div class="card" style="padding:18px;margin-bottom:14px;cursor:default">';
  html += '<div style="font-size:14px;font-weight:600;margin-bottom:12px">Overall Progress</div>';
  html += '<div class="progress-bar" style="height:8px;margin-bottom:8px"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
  html += '<div style="font-size:13px;color:var(--text3)">' + done + ' of ' + allLessonCount + ' lessons completed (' + Math.round(pct) + '%)</div></div>';

  for (var i = 0; i < COURSES.length; i++) {
    var c = COURSES[i];
    var t = totalLessons(c), d = completedLessons(c), p = t > 0 ? (d / t * 100) : 0;
    html += '<div class="card" style="margin-bottom:8px;padding:14px;cursor:default">';
    html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">';
    html += '<span style="font-size:18px">' + c.icon + '</span>';
    html += '<span style="font-size:14px;font-weight:600;flex:1">' + c.title + '</span>';
    html += '<span style="font-size:12px;color:var(--text3)">' + d + '/' + t + '</span></div>';
    html += '<div class="progress-bar"><div class="progress-fill" style="width:' + p + '%;background:' + c.color + '"></div></div></div>';
  }

  html += '<button class="btn btn-ghost" style="width:100%;margin-top:20px" onclick="logout()">Sign Out</button>';

  document.getElementById("pg-profile").innerHTML = html;
}
